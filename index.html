<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Quest - เกมเรียนรู้ CSS</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--card2:#1c2333;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#4dabf7;--accent-dim:#2f8fdb;--gold:#e3b341;--danger:#ff6b6b;--info:#79c0ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Kanit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#app{position:relative;z-index:1;min-height:100vh;}
.cf{font-family:'Fira Code',monospace;}
.xp-outer{background:var(--border);border-radius:999px;height:10px;overflow:hidden;}
.xp-inner{height:100%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));border-radius:999px;transition:width .8s cubic-bezier(.25,1,.5,1);box-shadow:0 0 10px rgba(77,171,247,.4);}
.gc{background:var(--card);border:1px solid var(--border);border-radius:16px;transition:all .3s ease;}
.gc:hover{border-color:rgba(77,171,247,.25);}
.bp{background:linear-gradient(135deg,var(--accent-dim),var(--accent));color:#0d1117;font-weight:700;padding:13px 32px;border-radius:12px;border:none;cursor:pointer;font-size:1rem;font-family:'Kanit',sans-serif;transition:all .3s ease;box-shadow:0 4px 20px rgba(77,171,247,.3);display:inline-flex;align-items:center;justify-content:center;gap:8px;}
.bp:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(77,171,247,.5);}.bp:active{transform:translateY(0);}.bp:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
.bs{background:var(--card2);color:var(--text);font-weight:600;padding:11px 24px;border-radius:12px;border:1px solid var(--border);cursor:pointer;font-size:.9rem;font-family:'Kanit',sans-serif;transition:all .3s ease;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
.bs:hover{border-color:var(--accent);color:var(--accent);}
.bsm{padding:8px 18px;font-size:.82rem;border-radius:10px;}
.code-block{background:#0a0e14;border:1px solid var(--border);border-radius:12px;padding:18px;overflow-x:auto;font-family:'Fira Code',monospace;font-size:.8rem;line-height:1.8;tab-size:2;white-space:pre;color:var(--text);}
.code-block .tag{color:#7ee787;}.code-block .attr{color:#79c0ff;}.code-block .val{color:#ffa657;}.code-block .cmt{color:#8b949e;font-style:italic;}.code-block .sel{color:#d2a8ff;}.code-block .prop{color:#79c0ff;}
.pf{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff;}
.pf iframe{width:100%;height:200px;border:none;display:block;}
.pb{background:var(--card);padding:7px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);}
.pd{width:10px;height:10px;border-radius:50%;}
.ew{display:flex;background:#0a0e14;border:2px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .4s,box-shadow .4s;min-height:260px;}
.ew.ok{border-color:var(--accent);box-shadow:0 0 20px rgba(77,171,247,.15);}
.ew.err{border-color:var(--danger);box-shadow:0 0 15px rgba(255,107,107,.15);}
.ln{padding:14px 0;min-width:40px;text-align:right;padding-right:10px;color:#484f58;font-family:'Fira Code',monospace;font-size:.8rem;line-height:1.8;user-select:none;border-right:1px solid var(--border);overflow:hidden;background:#0a0e14;flex-shrink:0;}
.ce{flex:1;padding:14px;background:transparent;color:var(--text);font-family:'Fira Code',monospace;font-size:.8rem;line-height:1.8;border:none;outline:none;resize:none;tab-size:2;white-space:pre;overflow:auto;min-height:260px;width:100%;}
.ce::selection{background:rgba(77,171,247,.2);}
.ci{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;transition:all .3s;font-size:.88rem;}
.ci.pass{background:rgba(77,171,247,.08);color:var(--accent);}.ci.fail{background:rgba(255,107,107,.08);color:var(--danger);}.ci.pend{background:var(--card2);color:var(--muted);}
.ch{font-size:.76rem;color:var(--muted);margin-top:4px;margin-left:30px;padding:6px 10px;background:rgba(227,179,65,.08);border-radius:8px;border-left:3px solid var(--gold);display:none;}.ci.fail .ch{display:block;}
.lc{position:relative;cursor:pointer;transition:all .3s;}.lc.locked{opacity:.35;cursor:not-allowed;pointer-events:none;}.lc.locked:hover{opacity:.4;}
.lc.done{border-color:rgba(77,171,247,.3);}.lc.done .lnum{background:var(--accent);border-color:var(--accent);color:#0d1117;}
.lc.cur{border-color:rgba(77,171,247,.5);box-shadow:0 0 20px rgba(77,171,247,.1);}
.lnum{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:700;transition:all .3s;flex-shrink:0;}
.tab-btn{padding:10px 0;flex:1;text-align:center;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .3s;color:var(--muted);font-size:.9rem;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.sb{animation:si .4s ease forwards;border-radius:12px;padding:12px 20px;display:flex;align-items:center;gap:10px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.4);pointer-events:auto;}
.sb.lv{animation:so .3s ease forwards;}
.sb-s{background:rgba(77,171,247,.15);border:1px solid rgba(77,171,247,.3);color:var(--accent);}.sb-e{background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.3);color:var(--danger);}.sb-i{background:rgba(227,179,65,.15);border:1px solid rgba(227,179,65,.3);color:var(--gold);}
.confetti{position:fixed;width:10px;height:10px;z-index:100;animation:cfa linear forwards;pointer-events:none;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:all .3s;}
.dot.done{background:var(--accent);box-shadow:0 0 6px rgba(77,171,247,.5);}.dot.no{background:var(--border);}
@keyframes fiu{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
@keyframes sd{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes gl{0%,100%{text-shadow:0 0 20px rgba(77,171,247,.3);}50%{text-shadow:0 0 40px rgba(77,171,247,.6),0 0 80px rgba(77,171,247,.2);}}
@keyframes sc{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes cfa{0%{transform:translateY(-100vh) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
@keyframes si{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes so{from{transform:translateX(0);opacity:1;}to{transform:translateX(100%);opacity:0;}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(77,171,247,.4);}50%{box-shadow:0 0 0 10px rgba(77,171,247,0);}}
.afiu{animation:fiu .6s ease forwards;}.afi{animation:fi .5s ease forwards;}.asd{animation:sd .4s ease forwards;}.afl{animation:fl 3s ease-in-out infinite;}.agl{animation:gl 3s ease-in-out infinite;}.apulse{animation:pulse 2s ease-in-out infinite;}
.s1{animation-delay:.1s;opacity:0;}.s2{animation-delay:.2s;opacity:0;}.s3{animation-delay:.3s;opacity:0;}.s4{animation-delay:.4s;opacity:0;}.s5{animation-delay:.5s;opacity:0;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media(max-width:768px){.code-block,.ce,.ln{font-size:.7rem;}.lnum{width:38px;height:38px;font-size:.85rem;}.ew,.ce{min-height:200px;}.editor-grid{flex-direction:column!important;}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
</style>
</head>
<body>
<canvas id="bgCanvas" aria-hidden="true"></canvas>
<div id="app" role="main"></div>
<div id="tc" style="position:fixed;top:20px;right:20px;z-index:80;display:flex;flex-direction:column;gap:10px;pointer-events:none;"></div>
<script>
/* ================================================================
   ข้อมูลด่านทั้ง 16 ด่าน - CSS Quest
   ================================================================ */
const LS=[

{id:1,title:'รู้จัก CSS และวิธีเขียน',icon:'fa-brands fa-css3-alt',
desc:'เรียนรู้ว่า CSS คืออะไร และวิธีเขียน 3 แบบ',
pts:['CSS ย่อมาจาก Cascading Style Sheets ใช้จัดรูปแบบหน้าเว็บ','เขียนแบบ <span class="cf" style="color:#ffa657;">Inline</span> ด้วย attribute <code class="cf" style="color:#79c0ff;">style="..."</code>','เขียนแบบ <span class="cf" style="color:#ffa657;">Internal</span> ด้วยแท็ก <code class="cf" style="color:#7ee787;">&lt;style&gt;</code> ใน <code class="cf" style="color:#7ee787;">&lt;head&gt;</code>','รูปแบบกฎ CSS คือ <code class="cf" style="color:#d2a8ff;">selector</code> <code class="cf" style="color:#79c0ff;">{ property: value; }</code>'],
code:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n  h1 {\n    color: #4dabf7;\n  }\n  p {\n    font-size: 18px;\n  }\n</style>\n</head>\n<body>\n  <h1 style="text-decoration: underline;">หัวข้อ (inline style)</h1>\n  <p>ข้อความย่อหน้า (internal style)</p>\n</body>\n</html>',
prac:{title:'เขียน CSS แบบ Internal',desc:'สร้าง <style> ใน head แล้วกำหนดสี h1 และขนาดตัวอักษรของ p',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <h1>สวัสดี CSS</h1>\n  <p>นี่คือย่อหน้าแรกของฉัน</p>\n</body>\n</html>',cks:[{lb:'มีแท็ก <style>',ck:d=>!!d.querySelector('style')},{lb:'h1 กำหนด color',ck:(d,c)=>/h1\s*{[^}]*color\s*:/i.test(c)},{lb:'p กำหนด font-size',ck:(d,c)=>/p\s*{[^}]*font-size\s*:/i.test(c)}],xp:15,gh:'เขียนกฎในรูปแบบ selector { property: value; } ภายในแท็ก <style>'},
tests:[
{title:'เขียน CSS แบบ Inline',desc:'สร้าง h1 ที่มี inline style กำหนดสีตัวอักษร',start:'<!DOCTYPE html>\n<html>\n<head></head>\n<body>\n  \n</body>\n</html>',cks:[{lb:'มี <h1>',ck:d=>!!d.querySelector('h1')},{lb:'h1 มี inline style กำหนด color',ck:(d,c)=>/<h1[^>]*style\s*=\s*["'][^"']*color\s*:/i.test(c)}]},
{title:'กำหนดพื้นหลังทั้งหน้า',desc:'สร้าง style block ที่กำหนด background-color ให้ body',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <p>ทดสอบพื้นหลัง</p>\n</body>\n</html>',cks:[{lb:'มี body { }',ck:(d,c)=>/body\s*{/i.test(c)},{lb:'body กำหนด background-color',ck:(d,c)=>/body\s*{[^}]*background-color\s*:/i.test(c)}]},
{title:'ใช้ทั้ง Inline และ Internal',desc:'ทำให้ p มีสีจาก internal style และ h1 มี inline style',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <h1>หัวข้อ</h1>\n  <p>ย่อหน้า</p>\n</body>\n</html>',cks:[{lb:'p กำหนด color ใน <style>',ck:(d,c)=>/p\s*{[^}]*color\s*:/i.test(c)},{lb:'h1 มี inline style',ck:(d,c)=>/<h1\s+style\s*=/i.test(c)}]}
]},

{id:2,title:'ตัวเลือก Selectors พื้นฐาน',icon:'fa-solid fa-crosshairs',
desc:'เรียนรู้การเลือกองค์ประกอบด้วย Selector แบบต่างๆ',
pts:['<code class="cf" style="color:#d2a8ff;">tag</code> เลือกตามชื่อแท็ก เช่น <code class="cf">p { }</code>','<code class="cf" style="color:#d2a8ff;">.class</code> เลือกตามคลาส เช่น <code class="cf">.box { }</code>','<code class="cf" style="color:#d2a8ff;">#id</code> เลือกตาม id เช่น <code class="cf">#main { }</code>','<code class="cf" style="color:#d2a8ff;">*</code> เลือกทุกองค์ประกอบ, ใช้ <code class="cf">,</code> เลือกหลายตัวพร้อมกัน'],
code:'<style>\n  * { box-sizing: border-box; }\n  .box {\n    background: #1c2333;\n  }\n  #title {\n    color: #4dabf7;\n  }\n  h2, h3 {\n    font-weight: 700;\n  }\n</style>\n<h1 id="title">หัวข้อหลัก</h1>\n<div class="box">กล่องคลาส box</div>',
prac:{title:'ใช้ class และ id',desc:'สร้างกฎ .highlight และ #main ให้กำหนดสีต่างกัน',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <h1 id="main">หัวข้อ</h1>\n  <p class="highlight">ข้อความไฮไลท์</p>\n</body>\n</html>',cks:[{lb:'มี .highlight { }',ck:(d,c)=>/\.highlight\s*{/i.test(c)},{lb:'มี #main { }',ck:(d,c)=>/#main\s*{/i.test(c)},{lb:'.highlight กำหนด color',ck:(d,c)=>/\.highlight\s*{[^}]*color\s*:/i.test(c)}],xp:20,gh:'class ใช้จุดนำหน้า (.) ส่วน id ใช้เครื่องหมายชาร์ป (#)'},
tests:[
{title:'เลือกด้วยชื่อแท็ก',desc:'กำหนดสีให้ span ทุกตัวด้วย tag selector',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <p><span>คำที่ 1</span> <span>คำที่ 2</span></p>\n</body>\n</html>',cks:[{lb:'มี span { }',ck:(d,c)=>/span\s*{/i.test(c)},{lb:'span กำหนด color',ck:(d,c)=>/span\s*{[^}]*color\s*:/i.test(c)}]},
{title:'เลือกหลายตัวพร้อมกัน',desc:'กำหนด font-weight ให้ h1 และ h2 พร้อมกันด้วย comma',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <h1>หัวข้อ 1</h1>\n  <h2>หัวข้อ 2</h2>\n</body>\n</html>',cks:[{lb:'มี h1, h2 { }',ck:(d,c)=>/h1\s*,\s*h2\s*{/i.test(c)},{lb:'กำหนด font-weight',ck:(d,c)=>/h1\s*,\s*h2\s*{[^}]*font-weight\s*:/i.test(c)}]},
{title:'ใช้ Universal Selector',desc:'ใช้ * เพื่อกำหนด box-sizing ให้ทุกองค์ประกอบ',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div>เนื้อหา</div>\n</body>\n</html>',cks:[{lb:'มี * { }',ck:(d,c)=>/\*\s*{/.test(c)},{lb:'กำหนด box-sizing',ck:(d,c)=>/\*\s*{[^}]*box-sizing\s*:/i.test(c)}]}
]},

{id:3,title:'สีและพื้นหลัง',icon:'fa-solid fa-palette',
desc:'เรียนรู้การกำหนดสีตัวอักษรและพื้นหลัง',
pts:['<code class="cf" style="color:#79c0ff;">color</code> กำหนดสีตัวอักษร','<code class="cf" style="color:#79c0ff;">background-color</code> กำหนดสีพื้นหลัง','<code class="cf" style="color:#79c0ff;">background-image</code> ใส่รูปพื้นหลัง','สีเขียนได้หลายแบบ: ชื่อสี, <code class="cf">#hex</code>, <code class="cf">rgb()</code>, <code class="cf">rgba()</code>'],
code:'<style>\n  body {\n    background-color: #0d1117;\n  }\n  h1 {\n    color: #4dabf7;\n  }\n  .card {\n    background-color: rgba(77,171,247,0.15);\n    color: rgb(255,255,255);\n  }\n</style>\n<h1>ตัวอย่างสี</h1>\n<div class="card">การ์ดโปร่งแสง</div>',
prac:{title:'กำหนดสีให้หน้าเว็บ',desc:'กำหนด background-color ของ body และ color ของ h1',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <h1>สีสันสวยงาม</h1>\n</body>\n</html>',cks:[{lb:'body กำหนด background-color',ck:(d,c)=>/body\s*{[^}]*background-color\s*:/i.test(c)},{lb:'h1 กำหนด color',ck:(d,c)=>/h1\s*{[^}]*color\s*:/i.test(c)}],xp:20,gh:'สีเขียนเป็นชื่อ (red), hex (#ff0000) หรือ rgb(255,0,0) ก็ได้'},
tests:[
{title:'ใช้สีแบบ HEX',desc:'กำหนด color ของ p เป็นค่า hex เช่น #ff6b6b',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <p>ข้อความสี</p>\n</body>\n</html>',cks:[{lb:'p กำหนด color แบบ hex',ck:(d,c)=>/p\s*{[^}]*color\s*:\s*#[0-9a-f]{3,6}/i.test(c)}]},
{title:'ใช้สีแบบ rgba โปร่งแสง',desc:'กำหนด background-color ของ .box ด้วย rgba',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div class="box">กล่อง</div>\n</body>\n</html>',cks:[{lb:'มี .box { }',ck:(d,c)=>/\.box\s*{/i.test(c)},{lb:'ใช้ rgba() กำหนด background-color',ck:(d,c)=>/\.box\s*{[^}]*background-color\s*:\s*rgba\(/i.test(c)}]},
{title:'ใส่รูปพื้นหลัง',desc:'กำหนด background-image ให้ .banner',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div class="banner">แบนเนอร์</div>\n</body>\n</html>',cks:[{lb:'มี .banner { }',ck:(d,c)=>/\.banner\s*{/i.test(c)},{lb:'กำหนด background-image',ck:(d,c)=>/\.banner\s*{[^}]*background-image\s*:/i.test(c)}]}
]},

{id:4,title:'กล่องและระยะห่าง Box Model',icon:'fa-solid fa-cube',
desc:'เรียนรู้ margin, border, padding, width และ box-sizing',
pts:['<code class="cf" style="color:#79c0ff;">margin</code> ระยะห่างด้านนอกกล่อง','<code class="cf" style="color:#79c0ff;">padding</code> ระยะห่างด้านในก่อนถึงเนื้อหา','<code class="cf" style="color:#79c0ff;">border</code>, <code class="cf" style="color:#79c0ff;">width</code>, <code class="cf" style="color:#79c0ff;">height</code> กำหนดขนาดกล่อง','<code class="cf" style="color:#79c0ff;">box-sizing: border-box</code> รวม border/padding ไว้ในความกว้างที่กำหนด'],
code:'<style>\n  .box {\n    width: 200px;\n    padding: 16px;\n    margin: 20px;\n    border: 2px solid #4dabf7;\n    box-sizing: border-box;\n  }\n</style>\n<div class="box">กล่อง Box Model</div>',
prac:{title:'สร้างกล่องตาม Box Model',desc:'กำหนด width, padding, margin และ border ให้ .card',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div class="card">เนื้อหาในกล่อง</div>\n</body>\n</html>',cks:[{lb:'.card กำหนด width',ck:(d,c)=>/\.card\s*{[^}]*width\s*:/i.test(c)},{lb:'.card กำหนด padding',ck:(d,c)=>/\.card\s*{[^}]*padding\s*:/i.test(c)},{lb:'.card กำหนด border',ck:(d,c)=>/\.card\s*{[^}]*border\s*:/i.test(c)}],xp:25,gh:'ลำดับจากในสุดไปนอกสุด: content > padding > border > margin'},

tests:[
{title:'ทำแถวที่ตัดบรรทัดได้',desc:'กำหนด display: flex และ flex-wrap: wrap ให้ .gallery',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div class="gallery">\n    <div>1</div><div>2</div><div>3</div>\n  </div>\n</body>\n</html>',cks:[{lb:'.gallery กำหนด display: flex',ck:(d,c)=>/\.gallery\s*{[^}]*display\s*:\s*flex/i.test(c)},{lb:'.gallery กำหนด flex-wrap: wrap',ck:(d,c)=>/\.gallery\s*{[^}]*flex-wrap\s*:\s*wrap/i.test(c)}]},

{id:11,title:'Grid พื้นฐาน',icon:'fa-solid fa-table-cells',
desc:'เรียนรู้การจัดวางแบบตารางด้วย CSS Grid',
pts:['<code class="cf" style="color:#79c0ff;">display: grid</code> เปิดใช้งาน grid layout','<code class="cf" style="color:#79c0ff;">grid-template-columns</code> กำหนดจำนวน/ขนาดคอลัมน์','หน่วย <code class="cf" style="color:#ffa657;">fr</code> แบ่งพื้นที่ตามสัดส่วน','<code class="cf" style="color:#79c0ff;">gap</code> เว้นระยะระหว่างช่อง grid'],
code:'<style>\n  .grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    gap: 10px;\n  }\n  .cell {\n    background: #4dabf7;\n    padding: 16px;\n    text-align: center;\n  }\n</style>\n<div class="grid">\n  <div class="cell">1</div>\n  <div class="cell">2</div>\n  <div class="cell">3</div>\n</div>',
prac:{title:'สร้างตาราง 3 คอลัมน์',desc:'กำหนด .grid เป็น display: grid และ grid-template-columns 3 ช่อง',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div class="grid">\n    <div>1</div><div>2</div><div>3</div>\n  </div>\n</body>\n</html>',cks:[{lb:'.grid กำหนด display: grid',ck:(d,c)=>/\.grid\s*{[^}]*display\s*:\s*grid/i.test(c)},{lb:'.grid กำหนด grid-template-columns',ck:(d,c)=>/\.grid\s*{[^}]*grid-template-columns\s*:/i.test(c)},{lb:'เรนเดอร์เป็น grid จริง',ck:d=>{const el=d.querySelector('.grid');return el&&d.defaultView.getComputedStyle(el).display==='grid';}}],xp:30,gh:'grid-template-columns: 1fr 1fr 1fr สร้าง 3 คอลัมน์ขนาดเท่ากัน'},
tests:[
{title:'สร้างตาราง 2 คอลัมน์',desc:'กำหนด grid-template-columns เป็น 2 คอลัมน์เท่ากัน',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div class="two-col">\n    <div>ซ้าย</div><div>ขวา</div>\n  </div>\n</body>\n</html>',cks:[{lb:'.two-col กำหนด display: grid',ck:(d,c)=>/\.two-col\s*{[^}]*display\s*:\s*grid/i.test(c)},{lb:'.two-col กำหนด grid-template-columns',ck:(d,c)=>/\.two-col\s*{[^}]*grid-template-columns\s*:/i.test(c)}]},
{title:'เว้นระยะช่อง grid',desc:'กำหนด gap ให้ .board',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div class="board">\n    <div>A</div><div>B</div>\n  </div>\n</body>\n</html>',cks:[{lb:'.board กำหนด display: grid',ck:(d,c)=>/\.board\s*{[^}]*display\s*:\s*grid/i.test(c)},{lb:'.board กำหนด gap',ck:(d,c)=>/\.board\s*{[^}]*gap\s*:/i.test(c)}]},
{title:'กำหนดแถวด้วย grid-template-rows',desc:'กำหนด grid-template-rows ให้ .layout',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div class="layout">\n    <div>บน</div><div>ล่าง</div>\n  </div>\n</body>\n</html>',cks:[{lb:'.layout กำหนด display: grid',ck:(d,c)=>/\.layout\s*{[^}]*display\s*:\s*grid/i.test(c)},{lb:'.layout กำหนด grid-template-rows',ck:(d,c)=>/\.layout\s*{[^}]*grid-template-rows\s*:/i.test(c)}]}
]},

{id:12,title:'Grid ขั้นสูง',icon:'fa-solid fa-table-cells-large',
desc:'เรียนรู้ grid-template-areas และการรวมช่อง',
pts:['<code class="cf" style="color:#79c0ff;">grid-template-areas</code> ตั้งชื่อผังหน้าเว็บเป็นภาพ','<code class="cf" style="color:#79c0ff;">grid-area</code> กำหนดว่าองค์ประกอบอยู่ช่องไหน','<code class="cf" style="color:#79c0ff;">grid-column: span 2</code> รวมหลายคอลัมน์เป็นช่องเดียว','<code class="cf" style="color:#79c0ff;">grid-row</code> รวมหลายแถวเข้าด้วยกัน'],
code:'<style>\n  .layout {\n    display: grid;\n    grid-template-columns: 1fr 3fr;\n    grid-template-areas:\n      "sidebar header"\n      "sidebar main";\n    gap: 8px;\n  }\n  .header { grid-area: header; }\n  .sidebar { grid-area: sidebar; }\n  .main { grid-area: main; }\n</style>\n<div class="layout">\n  <div class="header">หัว</div>\n  <div class="sidebar">เมนู</div>\n  <div class="main">เนื้อหา</div>\n</div>',
prac:{title:'จัดผังด้วย grid-template-areas',desc:'สร้างผัง header/sidebar/main ด้วย grid-template-areas',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div class="layout">\n    <div class="header">หัว</div>\n    <div class="sidebar">เมนู</div>\n    <div class="main">เนื้อหา</div>\n  </div>\n</body>\n</html>',cks:[{lb:'.layout กำหนด display: grid',ck:(d,c)=>/\.layout\s*{[^}]*display\s*:\s*grid/i.test(c)},{lb:'.layout กำหนด grid-template-areas',ck:(d,c)=>/\.layout\s*{[^}]*grid-template-areas\s*:/i.test(c)},{lb:'มี grid-area กำหนดให้ header หรือ sidebar',ck:(d,c)=>/grid-area\s*:/i.test(c)}],xp:35,gh:'ชื่อใน grid-template-areas ต้องตรงกับ grid-area ที่แต่ละองค์ประกอบใช้'},
tests:[
{title:'รวมคอลัมน์ด้วย span',desc:'กำหนด grid-column: span 2 ให้ .wide',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;">\n    <div class="wide">กว้าง</div>\n    <div>3</div>\n  </div>\n</body>\n</html>',cks:[{lb:'.wide กำหนด grid-column',ck:(d,c)=>/\.wide\s*{[^}]*grid-column\s*:/i.test(c)}]},
{title:'กำหนด grid-area ให้องค์ประกอบ',desc:'กำหนด grid-area ให้ .footer',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div class="footer">ท้ายเว็บ</div>\n</body>\n</html>',cks:[{lb:'.footer กำหนด grid-area',ck:(d,c)=>/\.footer\s*{[^}]*grid-area\s*:/i.test(c)}]},
{title:'รวมแถวด้วย grid-row',desc:'กำหนด grid-row: span 2 ให้ .tall',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div style="display:grid;">\n    <div class="tall">สูง</div>\n  </div>\n</body>\n</html>',cks:[{lb:'.tall กำหนด grid-row',ck:(d,c)=>/\.tall\s*{[^}]*grid-row\s*:/i.test(c)}]}
]},

{id:13,title:'Pseudo-class และ Pseudo-element',icon:'fa-solid fa-wand-magic-sparkles',
desc:'เรียนรู้การเลือกสถานะและส่วนพิเศษขององค์ประกอบ',
pts:['<code class="cf" style="color:#d2a8ff;">:hover</code> สถานะเมื่อเมาส์ชี้','<code class="cf" style="color:#d2a8ff;">:nth-child()</code> เลือกตามลำดับลูก','<code class="cf" style="color:#d2a8ff;">::before</code> / <code class="cf" style="color:#d2a8ff;">::after</code> แทรกเนื้อหาก่อน/หลังองค์ประกอบ (ต้องมี <code class="cf">content</code>)','<code class="cf" style="color:#d2a8ff;">:first-child</code>, <code class="cf" style="color:#d2a8ff;">:last-child</code> เลือกลูกตัวแรก/สุดท้าย'],
code:'<style>\n  .btn:hover {\n    background: #4dabf7;\n  }\n  li:nth-child(2) {\n    color: #ff6b6b;\n  }\n  .quote::before {\n    content: "\\201C";\n  }\n</style>\n<button class="btn">ลองชี้เมาส์</button>\n<ul><li>หนึ่ง</li><li>สอง</li><li>สาม</li></ul>\n<p class="quote">คำคม</p>',
prac:{title:'ใช้ :hover และ ::before',desc:'กำหนด .btn:hover เปลี่ยนสี และ .tag::before ใส่ content',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <button class="btn">ปุ่ม</button>\n  <span class="tag">แท็ก</span>\n</body>\n</html>',cks:[{lb:'มี .btn:hover { }',ck:(d,c)=>/\.btn:hover\s*{/i.test(c)},{lb:'.btn:hover กำหนด background หรือ color',ck:(d,c)=>/\.btn:hover\s*{[^}]*(background|color)\s*:/i.test(c)},{lb:'มี .tag::before พร้อม content',ck:(d,c)=>/\.tag::before\s*{[^}]*content\s*:/i.test(c)}],xp:30,gh:'::before/::after ต้องมี content: "..." เสมอถึงจะแสดงผล'},
tests:[
{title:'เปลี่ยนสีลิงก์เมื่อชี้',desc:'กำหนด a:hover ให้เปลี่ยน color',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <a href="#">ลิงก์</a>\n</body>\n</html>',cks:[{lb:'มี a:hover { }',ck:(d,c)=>/a:hover\s*{/i.test(c)},{lb:'a:hover กำหนด color',ck:(d,c)=>/a:hover\s*{[^}]*color\s*:/i.test(c)}]},
{title:'เลือกแถวคู่ในตาราง',desc:'ใช้ :nth-child(even) กำหนดสีพื้นหลังแถว li',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <ul><li>1</li><li>2</li><li>3</li><li>4</li></ul>\n</body>\n</html>',cks:[{lb:'มี li:nth-child(even) หรือคล้ายกัน',ck:(d,c)=>/li:nth-child\(/i.test(c)}]},
{title:'แทรกไอคอนด้วย ::after',desc:'ใช้ .link::after ใส่ content ลูกศร',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <span class="link">ไปต่อ</span>\n</body>\n</html>',cks:[{lb:'มี .link::after { }',ck:(d,c)=>/\.link::after\s*{/i.test(c)},{lb:'.link::after กำหนด content',ck:(d,c)=>/\.link::after\s*{[^}]*content\s*:/i.test(c)}]}
]},

{id:14,title:'Transition และ Animation',icon:'fa-solid fa-wand-sparkles',
desc:'เรียนรู้การทำเอฟเฟกต์เคลื่อนไหว',
pts:['<code class="cf" style="color:#79c0ff;">transition</code> ทำให้การเปลี่ยนค่าค่อยๆ เปลี่ยนแบบนุ่มนวล','<code class="cf" style="color:#d2a8ff;">@keyframes</code> กำหนดขั้นตอนของแอนิเมชัน','<code class="cf" style="color:#79c0ff;">animation</code> เรียกใช้ keyframes กับองค์ประกอบ','ระบุระยะเวลาเป็นวินาที (s) เช่น <code class="cf">0.3s</code>'],
code:'<style>\n  .btn {\n    background: #4dabf7;\n    transition: background 0.3s, transform 0.3s;\n  }\n  .btn:hover {\n    background: #ff6b6b;\n    transform: scale(1.1);\n  }\n  @keyframes bounce {\n    0%,100% { transform: translateY(0); }\n    50% { transform: translateY(-10px); }\n  }\n  .ball {\n    animation: bounce 1.2s infinite;\n  }\n</style>\n<button class="btn">ลองชี้เมาส์</button>\n<div class="ball">●</div>',
prac:{title:'สร้างปุ่มที่มี transition',desc:'กำหนด transition ให้ .btn และเปลี่ยนสีเมื่อ hover',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <button class="btn">ปุ่ม</button>\n</body>\n</html>',cks:[{lb:'.btn กำหนด transition',ck:(d,c)=>/\.btn\s*{[^}]*transition\s*:/i.test(c)},{lb:'มี .btn:hover { }',ck:(d,c)=>/\.btn:hover\s*{/i.test(c)}],xp:30,gh:'transition ใส่ใน state ปกติ ไม่ใช่ใน :hover'},
tests:[
{title:'สร้าง keyframes',desc:'สร้าง @keyframes ชื่อ fade และนำไปใช้กับ .box',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div class="box">กล่อง</div>\n</body>\n</html>',cks:[{lb:'มี @keyframes',ck:(d,c)=>/@keyframes\s+\w+/i.test(c)},{lb:'.box กำหนด animation',ck:(d,c)=>/\.box\s*{[^}]*animation\s*:/i.test(c)}]},
{title:'ทำ transition ความโปร่งใส',desc:'กำหนด transition: opacity ให้ .fade-item',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div class="fade-item">เนื้อหา</div>\n</body>\n</html>',cks:[{lb:'.fade-item กำหนด transition',ck:(d,c)=>/\.fade-item\s*{[^}]*transition\s*:/i.test(c)}]},
{title:'แอนิเมชันวนซ้ำไม่สิ้นสุด',desc:'สร้าง animation ที่มี infinite ให้ .spin',start:'<!DOCTYPE html>\n<html>\n<head>\n<style>\n\n</style>\n</head>\n<body>\n  <div class="spin">⟳</div>\n</body>\n</html>',cks:[{lb:'มี @keyframes',ck:(d,c)=>/@keyframes\s+\w+/i.test(c)},{lb:'.spin กำหนด animation พร้อม infinite',ck:(d,c)=>/\.spin\s*{[^}]*animation\s*:[^}]*infinite/i.test(c)}]}
]},

{id:15,title:'Transform',icon:'fa-solid fa-arrows-spin',

/* ================================================================
   สถานะเกม - เก็บใน localStorage
   ================================================================ */
const SAVE_KEY='cssquest_v1';
let S={screen:'map',levelId:null,testIdx:null,unlocked:1,pDone:{},tDone:{},tab:'learn'};

function saveState(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({unlocked:S.unlocked,pDone:S.pDone,tDone:S.tDone}));}catch(e){}
}
function loadState(){
  try{
    const d=JSON.parse(localStorage.getItem(SAVE_KEY));
    if(d){S.unlocked=d.unlocked||1;S.pDone=d.pDone||{};S.tDone=d.tDone||{};}
  }catch(e){}
}
function resetState(){
  S.unlocked=1;S.pDone={};S.tDone={};S.screen='map';saveState();render();toast('รีเซ็ตข้อมูลเรียบร้อย','info');
}

/* คำนวณความคืบหน้า */
function getProgress(){
  let done=0,total=LS.length;
  LS.forEach(l=>{if(S.pDone[l.id])done++;});
  return{done,total,pct:Math.round((done/total)*100)};
}
function getLevelDone(lid){
  let c=0;if(S.pDone[lid])c++;
  for(let i=0;i<3;i++)if(S.tDone[lid+'-'+i])c++;
  return c;
}
function getTotalXP(){
  let xp=0;
  LS.forEach(l=>{
    if(S.pDone[l.id])xp+=l.prac.xp;
    for(let i=0;i<3;i++)if(S.tDone[l.id+'-'+i])xp+=15;
  });
  return xp;
}

/* ================================================================
   Toast และ Confetti
   ================================================================ */
function toast(msg,type='info'){
  const tc=document.getElementById('tc');
  const cls=type==='success'?'sb-s':type==='error'?'sb-e':'sb-i';
  const ico=type==='success'?'fa-check-circle':type==='error'?'fa-times-circle':'fa-info-circle';
  const el=document.createElement('div');
  el.className='sb '+cls;el.innerHTML=`<i class="fa-solid ${ico}"></i><span>${msg}</span>`;
  tc.appendChild(el);
  setTimeout(()=>{el.classList.add('lv');setTimeout(()=>el.remove(),300);},3000);
}
function confetti(){
  const colors=['#4dabf7','#ff6b6b','#e3b341','#79c0ff','#b794f4','#7ee787'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');el.className='confetti';
    el.style.left=Math.random()*100+'vw';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.width=(Math.random()*8+6)+'px';
    el.style.height=(Math.random()*8+6)+'px';
    el.style.borderRadius=Math.random()>.5?'50%':'2px';
    el.style.animationDuration=(Math.random()*2+2)+'s';
    el.style.animationDelay=(Math.random()*.8)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  }
}

/* ================================================================
   Syntax Highlighting สำหรับแสดงโค้ดตัวอย่าง
   ================================================================ */
function hl(code){
  let h=code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h=h.replace(/(\/\*[\s\S]*?\*\/)/g,'<span class="cmt">$1</span>');
  h=h.replace(/(&lt;\/?)([\w-]+)/g,'$1<span class="tag">$2</span>');
  h=h.replace(/([.#]?[\w-]+)(\s*{)/g,'<span class="sel">$1</span>$2');
  h=h.replace(/([\w-]+)(\s*:)/g,'<span class="prop">$1</span>$2');
  h=h.replace(/(".*?")/g,'<span class="val">$1</span>');
  return h;
}

/* ================================================================
   Background Animation - อนุภาคลอย
   ================================================================ */
const bgC=document.getElementById('bgCanvas');
const bgCtx=bgC.getContext('2d');
let particles=[];
const SYMBOLS=['{','}','#','.','%','fr',':',';','em','px','flex'];
function initBg(){
  bgC.width=window.innerWidth;bgC.height=window.innerHeight;
  particles=[];
  for(let i=0;i<35;i++){
    particles.push({
      x:Math.random()*bgC.width,y:Math.random()*bgC.height,
      vx:(Math.random()-.5)*.3,vy:Math.random()*.2+.1,
      sym:SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)],
      size:Math.random()*10+10,alpha:Math.random()*.12+.03
    });
  }
}
function animBg(){
  bgCtx.clearRect(0,0,bgC.width,bgC.height);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.y>bgC.height+30){p.y=-30;p.x=Math.random()*bgC.width;}
    if(p.x<-30)p.x=bgC.width+30;if(p.x>bgC.width+30)p.x=-30;
    bgCtx.font=p.size+'px Fira Code,monospace';
    bgCtx.fillStyle=`rgba(77,171,247,${p.alpha})`;
    bgCtx.fillText(p.sym,p.x,p.y);
  });
  requestAnimationFrame(animBg);
}
window.addEventListener('resize',initBg);
initBg();animBg();

/* ================================================================
   สร้าง Line Numbers
   ================================================================ */
function makeLineNums(code){
  const lines=code.split('\n');
  return lines.map((_,i)=>i+1).join('\n');
}

/* ================================================================
   ตรวจสอบโค้ด - สร้าง iframe แล้วรัน cks
   ================================================================ */
function runChecks(code,cks){
  return new Promise(resolve=>{
    const wrap=document.createElement('div');
    wrap.style.cssText='position:fixed;left:-9999px;top:-9999px;width:400px;height:300px;';
    const iframe=document.createElement('iframe');
    iframe.sandbox='allow-scripts';
    iframe.style.cssText='width:100%;height:100%;border:none;';
    wrap.appendChild(iframe);
    document.body.appendChild(wrap);
    let resolved=false;
    const finish=(results)=>{if(resolved)return;resolved=true;document.body.removeChild(wrap);resolve(results);};
    iframe.onload=()=>{
      try{
        const doc=iframe.contentDocument||iframe.contentWindow.document;
        const results=cks.map(c=>{
          try{const pass=c.ck(doc,code);return{lb:c.lb,pass,ht:c.ht||''};}
          catch(e){return{lb:c.lb,pass:false,ht:'เกิดข้อผิดพลาด: '+e.message};}
        });
        finish(results);
      }catch(e){finish(cks.map(c=>({lb:c.lb,pass:false,ht:'ไม่สามารถเข้าถึง iframe'})));}
    };
    setTimeout(()=>finish(cks.map(c=>({lb:c.lb,pass:false,ht:'หมดเวลาโหลด'}))),3000);
    iframe.srcdoc=code;
  });
}

/* ================================================================
   สร้าง Editor + Preview UI
   ================================================================ */
function buildEditorPreview(startCode,checkItems,onCheck){
  const editorId='ed_'+Date.now()+'_'+Math.floor(Math.random()*1000);
  const previewId='pv_'+Date.now()+'_'+Math.floor(Math.random()*1000);
  let html=`
  <div class="flex gap-4 editor-grid" style="flex-direction:row;">
    <div class="flex-1 min-w-0">
      <div class="text-xs font-semibold mb-2" style="color:var(--muted);"><i class="fa-solid fa-code mr-1"></i> โค้ดของคุณ</div>
      <div class="ew" id="ew_${editorId}">
        <div class="ln" id="ln_${editorId}">${makeLineNums(startCode)}</div>
        <textarea class="ce" id="${editorId}" spellcheck="false">${startCode.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
      </div>
    </div>
    <div class="flex-1 min-w-0">
      <div class="text-xs font-semibold mb-2" style="color:var(--muted);"><i class="fa-solid fa-eye mr-1"></i> ตัวอย่างผลลัพธ์</div>
      <div class="pf">
        <div class="pb"><div class="pd" style="background:#ff5f56;"></div><div class="pd" style="background:#ffbd2e;"></div><div class="pd" style="background:#27c93f;"></div><span class="ml-2 text-xs" style="color:var(--muted);">preview</span></div>
        <iframe id="${previewId}" sandbox="allow-scripts" style="width:100%;height:200px;border:none;"></iframe>
      </div>
    </div>
  </div>`;

  if(checkItems){
    html+=`<div class="mt-4 space-y-2" id="cks_${editorId}">`;
    checkItems.forEach((c,i)=>{
      html+=`<div class="ci pend" id="ck_${editorId}_${i}"><i class="fa-solid fa-circle" style="font-size:.5rem;"></i><span>${c.lb}</span><div class="ch">${c.ht||''}</div></div>`;
    });
    html+=`</div>`;
    html+=`<div class="mt-4 flex gap-3 flex-wrap"><button class="bp" id="btn_ck_${editorId}"><i class="fa-solid fa-play"></i> ตรวจสอบ</button><button class="bs bsm" id="btn_rst_${editorId}"><i class="fa-solid fa-rotate-left"></i> รีเซ็ต</button></div>`;
  }

  /* หลัง render แล้วจะ init */
  setTimeout(()=>{
    const ta=document.getElementById(editorId);
    const ln=document.getElementById(lnElId(editorId));
    const pv=document.getElementById(previewId);
    if(!ta)return;
    const origStart=startCode;
    function sync(){
      const v=ta.value;
      ln.textContent=makeLineNums(v);
      pv.srcdoc=v;
      const ew=document.getElementById('ew_'+editorId);
      if(ew){ew.classList.remove('ok','err');}
    }
    ta.addEventListener('input',sync);
    ta.addEventListener('keydown',function(e){
      if(e.key==='Tab'){
        e.preventDefault();
        const s=ta.selectionStart,en=ta.selectionEnd;
        ta.value=ta.value.substring(0,s)+'  '+ta.value.substring(en);
        ta.selectionStart=ta.selectionEnd=s+2;
        sync();
      }
    });
    sync();

    if(checkItems&&onCheck){
      const btnCk=document.getElementById('btn_ck_'+editorId);
      const btnRst=document.getElementById('btn_rst_'+editorId);
      if(btnCk)btnCk.addEventListener('click',async()=>{
        btnCk.disabled=true;btnCk.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> กำลังตรวจสอบ...';
        const results=await runChecks(ta.value,checkItems);
        const ew=document.getElementById('ew_'+editorId);
        let allPass=true;
        results.forEach((r,i)=>{
          const el=document.getElementById('ck_'+editorId+'_'+i);
          if(!el)return;
          el.className='ci '+(r.pass?'pass':'fail');
          el.querySelector('i').className='fa-solid '+(r.pass?'fa-check-circle':'fa-times-circle');
          if(!r.pass)allPass=false;
        });
        if(ew){ew.classList.add(allPass?'ok':'err');}
        btnCk.disabled=false;btnCk.innerHTML='<i class="fa-solid fa-play"></i> ตรวจสอบ';
        onCheck(results,allPass);
      });
      if(btnRst)btnRst.addEventListener('click',()=>{
        ta.value=origStart;sync();
        checkItems.forEach((_,i)=>{
          const el=document.getElementById('ck_'+editorId+'_'+i);
          if(el){el.className='ci pend';el.querySelector('i').className='fa-solid fa-circle';}
        });
        const ew=document.getElementById('ew_'+editorId);
        if(ew)ew.classList.remove('ok','err');
      });
    }
  },50);

  return html;
}
function lnElId(editorId){return 'ln_'+editorId;}

/* ================================================================
   Render: แผนที่ด่าน
   ================================================================ */
function renderMap(){
  const prog=getProgress();
  const xp=getTotalXP();
  let html=`<div class="max-w-4xl mx-auto px-4 py-8 afiu">`;
  /* หัว */
  html+=`<div class="text-center mb-8 s1 afiu">
    <div class="inline-flex items-center gap-3 mb-3">
      <i class="fa-brands fa-css3-alt text-3xl" style="color:var(--accent);"></i>
      <h1 class="text-3xl md:text-4xl font-extrabold agl">CSS Quest</h1>
    </div>
    <p style="color:var(--muted);" class="text-sm mb-4">เรียนรู้ CSS ผ่านการลงมือทำจริง - 16 ด่าน</p>
    <div class="max-w-md mx-auto">
      <div class="flex justify-between text-xs mb-1" style="color:var(--muted);"><span>ความคืบหน้า</span><span>${prog.done}/${prog.total} ด่าน</span></div>
      <div class="xp-outer"><div class="xp-inner" style="width:${prog.pct}%;"></div></div>
      <div class="flex justify-between text-xs mt-2"><span style="color:var(--gold);"><i class="fa-solid fa-coins mr-1"></i>${xp} XP</span>
      <button onclick="resetState()" class="text-xs hover:underline" style="color:var(--danger);background:none;border:none;cursor:pointer;font-family:Kanit;">รีเซ็ตข้อมูล</button></div>
    </div>
  </div>`;

  /* กริดด่าน */
  html+=`<div class="grid grid-cols-1 sm:grid-cols-2 gap-3">`;
  LS.forEach((l,idx)=>{
    const locked=l.id>S.unlocked;
    const done=!!S.pDone[l.id];
    const ld=getLevelDone(l.id);
    const cls=locked?'lc locked':done?'lc done':'lc'+(l.id===S.unlocked?' cur':'');
    html+=`<div class="gc ${cls} p-4 s${Math.min(idx%4+1,5)} afiu" ${!locked?`onclick="openLevel(${l.id})"`:''}>`;
    html+=`<div class="flex items-center gap-3">`;
    html+=`<div class="lnum">${locked?'<i class="fa-solid fa-lock text-xs"></i>':l.id}</div>`;
    html+=`<div class="flex-1 min-w-0">`;
    html+=`<div class="font-bold text-sm flex items-center gap-2"><i class="${l.icon} text-xs" style="color:${done?'var(--accent)':'var(--muted)'}"></i>${l.id}. ${l.title}</div>`;
    html+=`<div class="text-xs mt-1" style="color:var(--muted);">${locked?'ผ่านด่านก่อนหน้าก่อน':'แบบฝึกหัด + แบบทดสอบ 3 ข้อ'}</div>`;
    if(!locked){
      html+=`<div class="flex gap-1 mt-2">`;
      for(let i=0;i<4;i++){
        html+=`<div class="dot ${i<ld?'done':'no'}"></div>`;
      }
      html+=`<span class="text-xs ml-2" style="color:var(--muted);">${ld}/4</span>`;
      html+=`</div>`;
    }
    html+=`</div></div></div>`;
  });
  html+=`</div>`;

  /* จบเกม */
  if(prog.done===prog.total){
    html+=`<div class="gc p-6 mt-6 text-center afiu" style="border-color:var(--accent);background:rgba(77,171,247,.05);">
      <i class="fa-solid fa-trophy text-4xl mb-3" style="color:var(--gold);"></i>
      <h2 class="text-xl font-bold mb-2" style="color:var(--accent);">ยินดีด้วย! คุณผ่านทุกด่านแล้ว</h2>
      <p style="color:var(--muted);" class="text-sm">คุณได้เรียนรู้ CSS ครบทุกหมวดหมู่ รวม ${xp} XP</p>
    </div>`;
  }
  html+=`</div>`;
  document.getElementById('app').innerHTML=html;
}

/* ================================================================
   Render: หน้าด่าน (เรียนรู้ / ฝึกหัด / แบบทดสอบ)
   ================================================================ */
function renderLevel(){
  const l=LS.find(x=>x.id===S.levelId);
  if(!l){S.screen='map';render();return;}
  const ld=getLevelDone(l.id);
  let html=`<div class="max-w-5xl mx-auto px-4 py-6 afiu">`;
  /* หัว */
  html+=`<div class="flex items-center gap-3 mb-4">
    <button class="bs bsm" onclick="goMap()"><i class="fa-solid fa-arrow-left"></i></button>
    <div class="lnum apulse" style="width:40px;height:40px;font-size:.85rem;">${l.id}</div>
    <div class="flex-1 min-w-0">
      <div class="font-bold text-lg flex items-center gap-2"><i class="${l.icon}" style="color:var(--accent);"></i>${l.title}</div>
      <div class="text-xs" style="color:var(--muted);">${l.desc} &mdash; ${ld}/4 เสร็จแล้ว</div>
    </div>
    <div class="flex gap-1">${[0,1,2,3].map(i=>`<div class="dot ${i<ld?'done':'no'}"></div>`).join('')}</div>
  </div>`;

  /* แท็บ */
  html+=`<div class="flex mb-6" style="border-bottom:1px solid var(--border);">`;
  const tabs=[{k:'learn',lb:'เรียนรู้',ico:'fa-book-open'},{k:'practice',lb:'ฝึกหัด',ico:'fa-pencil'},{k:'test',lb:'แบบทดสอบ',ico:'fa-clipboard-check'}];
  tabs.forEach(t=>{
    html+=`<div class="tab-btn ${S.tab===t.k?'active':''}" onclick="switchTab('${t.k}')"><i class="fa-solid ${t.ico} mr-1"></i>${t.lb}</div>`;
  });
  html+=`</div>`;

  /* เนื้อหาแท็บ */
  if(S.tab==='learn'){
    html+=renderLearnTab(l);
  }else if(S.tab==='practice'){
    html+=renderPracticeTab(l);
  }else{
    html+=renderTestTab(l);
  }

  html+=`</div>`;
  document.getElementById('app').innerHTML=html;
}

function renderLearnTab(l){
  let h=`<div class="grid md:grid-cols-2 gap-6 afiu">`;
  /* ซ้าย: คำอธิบาย */
  h+=`<div>
    <h3 class="font-bold text-lg mb-4" style="color:var(--accent);"><i class="fa-solid fa-lightbulb mr-2"></i>สิ่งที่จะเรียนรู้</h3>

  /* ขวา: โค้ดตัวอย่าง + พรีวิว */
  h+=`<div>
    <h3 class="font-bold text-lg mb-4" style="color:var(--info);"><i class="fa-solid fa-code mr-2"></i>ตัวอย่างโค้ด</h3>
    <div class="code-block mb-4">${hl(l.code)}</div>

    <iframe id="learn_preview" sandbox="allow-scripts" style="width:100%;height:200px;border:none;"></iframe></div>
  </div>`;
  h+=`</div>`;
  setTimeout(()=>{const pv=document.getElementById('learn_preview');if(pv)pv.srcdoc=l.code;},50);
  return h;
}

function renderPracticeTab(l){
  const p=l.prac;
  const alreadyDone=!!S.pDone[l.id];
  let h=`<div class="afiu">`;
  h+=`<div class="gc p-4 mb-4 flex items-start gap-3">
    <i class="fa-solid fa-pencil mt-1" style="color:var(--gold);"></i>
    <div><div class="font-bold">${p.title}</div><div class="text-sm" style="color:var(--muted);">${p.desc}</div></div>
    <div class="ml-auto text-sm font-bold" style="color:var(--gold);">+${p.xp} XP</div>
  </div>`;
  if(alreadyDone){
    h+=`<div class="gc p-4 mb-4 flex items-center gap-3" style="border-color:var(--accent);background:rgba(77,171,247,.05);">
      <i class="fa-solid fa-check-circle text-xl" style="color:var(--accent);"></i>
      <span class="font-semibold" style="color:var(--accent);">ผ่านแบบฝึกหัดนี้แล้ว</span>
    </div>`;
  }
  h+=buildEditorPreview(p.start,p.cks,(results,allPass)=>{
    if(allPass&&!S.pDone[l.id]){
      S.pDone[l.id]=true;
      if(l.id>=S.unlocked&&l.id<LS.length)S.unlocked=l.id+1;
      saveState();confetti();
      toast('ผ่านแบบฝึกหัด! +'+p.xp+' XP','success');
      setTimeout(()=>renderLevel(),800);
    }else if(!allPass){
      toast('ยังผ่านไม่ครบ ลองอีกครั้ง','error');
    }
  });
  h+=`<div class="gc p-3 mt-4 text-sm" style="border-left:3px solid var(--info);"><i class="fa-solid fa-circle-info mr-1" style="color:var(--info);"></i>${p.gh}</div>`;
  h+=`</div>`;
  return h;
}

function renderTestTab(l){
  let h=`<div class="afiu">`;
  h+=`<h3 class="font-bold mb-4"><i class="fa-solid fa-clipboard-check mr-2" style="color:var(--gold);"></i>แบบทดสอบ 3 ข้อ (+15 XP ต่อข้อ)</h3>`;
  h+=`<div class="space-y-3">`;
  l.tests.forEach((t,i)=>{
    const done=!!S.tDone[l.id+'-'+i];
    h+=`<div class="gc p-4 flex items-center gap-4 cursor-pointer ${done?'':'hover:border-[var(--accent)]'}" onclick="openTest(${l.id},${i})" style="${done?'border-color:var(--accent);background:rgba(77,171,247,.03);':''}">
      <div class="lnum" style="width:36px;height:36px;font-size:.8rem;${done?'background:var(--accent);border-color:var(--accent);color:#0d1117;':''}">${done?'<i class="fa-solid fa-check text-xs"></i>':(i+1)}</div>
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-sm">${t.title}</div>
        <div class="text-xs" style="color:var(--muted);">${t.desc}</div>
      </div>
      <i class="fa-solid fa-chevron-right text-xs" style="color:var(--muted);"></i>
    </div>`;
  });
  h+=`</div></div>`;
  return h;
}

/* ================================================================
   Render: หน้าแบบทดสอบ
   ================================================================ */
function renderTest(){
  const l=LS.find(x=>x.id===S.levelId);
  if(!l){S.screen='map';render();return;}
  const t=l.tests[S.testIdx];
  if(!t){S.screen='level';S.tab='test';render();return;}
  const alreadyDone=!!S.tDone[l.id+'-'+S.testIdx];

  let html=`<div class="max-w-5xl mx-auto px-4 py-6 afiu">`;
  html+=`<div class="flex items-center gap-3 mb-4">
    <button class="bs bsm" onclick="backToLevel()"><i class="fa-solid fa-arrow-left"></i></button>
    <div class="flex-1 min-w-0">
      <div class="font-bold">ข้อที่ ${S.testIdx+1}/3: ${t.title}</div>
      <div class="text-xs" style="color:var(--muted);">${t.desc}</div>
    </div>
    <span class="text-sm font-bold" style="color:var(--gold);">+15 XP</span>
  </div>`;

  if(alreadyDone){
    html+=`<div class="gc p-4 mb-4 flex items-center gap-3" style="border-color:var(--accent);background:rgba(77,171,247,.05);">
      <i class="fa-solid fa-check-circle" style="color:var(--accent);"></i>
      <span style="color:var(--accent);">ทำข้อนี้แล้ว</span>
    </div>`;
  }

  html+=buildEditorPreview(t.start,t.cks,(results,allPass)=>{
    if(allPass&&!S.tDone[l.id+'-'+S.testIdx]){
      S.tDone[l.id+'-'+S.testIdx]=true;
      saveState();confetti();
      toast('ถูกต้อง! +15 XP','success');
      setTimeout(()=>{
        if(S.testIdx<2){S.testIdx++;render();}
        else{S.screen='level';S.tab='test';render();}
      },800);
    }else if(!allPass){
      toast('ยังไม่ถูกต้อง ลองอีกครั้ง','error');
    }
  });

  /* นำทาง */
  html+=`<div class="flex justify-between mt-4">`;
  if(S.testIdx>0)html+=`<button class="bs bsm" onclick="S.testIdx--;render();"><i class="fa-solid fa-arrow-left mr-1"></i>ข้อก่อนหน้า</button>`;
  else html+=`<div></div>`;
  if(S.testIdx<2)html+=`<button class="bs bsm" onclick="S.testIdx++;render();">ข้อถัดไป<i class="fa-solid fa-arrow-right ml-1"></i></button>`;
  else html+=`<button class="bs bsm" onclick="backToLevel()">กลับหน้าด่าน<i class="fa-solid fa-arrow-right ml-1"></i></button>`;
  html+=`</div>`;

  html+=`</div>`;
  document.getElementById('app').innerHTML=html;
}

/* ================================================================
   Navigation
   ================================================================ */
function goMap(){S.screen='map';render();}
function openLevel(id){S.screen='level';S.levelId=id;S.tab='learn';render();}
function switchTab(t){S.tab=t;renderLevel();}
function openTest(lid,idx){S.screen='test';S.levelId=lid;S.testIdx=idx;render();}
function backToLevel(){S.screen='level';S.tab='test';render();}

/* ================================================================
   Render Router
   ================================================================ */
function render(){
  switch(S.screen){
    case 'map':renderMap();break;
    case 'level':renderLevel();break;
    case 'test':renderTest();break;
    default:S.screen='map';renderMap();
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ================================================================
   เริ่มต้น
   ================================================================ */
loadState();
render();
</script>
</body>
</html>
